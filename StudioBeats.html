<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easter Beats - Rohan's Arcade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Spice&family=Bungee&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617; 
            background-image: radial-gradient(#1e293b 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #f1f5f9;
            overflow-x: hidden;
        }
        .spice-font { font-family: 'Bungee Spice', cursive; }
        .logo-font { font-family: 'Bungee', cursive; }
        
        .beat-track {
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid #334155;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            height: 520px;
            box-shadow: inset 0 0 50px rgba(56, 189, 248, 0.05);
            transition: all 0.1s ease;
        }

        .note {
            position: absolute;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #f472b6, #fbbf24);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            box-shadow: 0 0 30px rgba(244, 114, 182, 0.4);
            z-index: 20;
            border: 3px solid rgba(255,255,255,0.4);
            pointer-events: none;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .hit-zone {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            height: 100px;
            border-top: 4px dashed rgba(244, 114, 182, 0.5);
            background: linear-gradient(to bottom, rgba(244, 114, 182, 0.02), rgba(244, 114, 182, 0.1));
            pointer-events: none;
        }

        .control-panel {
            background: #0f172a;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #1e293b;
        }

        .instr-btn, .palette-btn {
            background: #1e293b;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .instr-btn.active, .palette-btn.active {
            background: #db2777;
            border-color: #f472b6;
            color: white;
            box-shadow: 0 0 15px rgba(219, 39, 119, 0.4);
        }

        .floating-score {
            position: absolute;
            animation: float-up 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
            font-weight: 900;
            color: #fbbf24;
            pointer-events: none;
            z-index: 50;
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        @keyframes float-up {
            from { transform: translateY(0) scale(0.5); opacity: 1; }
            to { transform: translateY(-80px) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="bg-slate-950/90 backdrop-blur-xl p-5 shadow-2xl sticky top-0 z-50 border-b border-pink-500/20">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="logo-font text-2xl md:text-3xl text-white tracking-tighter">ROHAN'S <span class="text-pink-400 underline decoration-yellow-400 decoration-4">STUDIO BEATS</span></h1>
            <div id="rec-indicator" class="hidden flex items-center gap-2 bg-pink-500/10 px-4 py-2 rounded-full text-pink-400 font-black text-xs border border-pink-500/30">
                <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div> MASTER REC ACTIVE
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 max-w-7xl mt-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Library & Controls -->
            <div class="lg:col-span-4 space-y-4">
                <!-- Instrument Library -->
                <div class="control-panel p-5">
                    <h3 class="font-black text-sm mb-4 flex items-center gap-2 text-pink-400 uppercase tracking-widest">
                        <span>🎹</span> Instrument Engine
                    </h3>
                    <div id="instrument-grid" class="grid grid-cols-4 gap-2">
                        <!-- Generated by JS -->
                    </div>
                </div>

                <!-- Melody Palette (BandLab Style) -->
                <div class="control-panel p-5">
                    <h3 class="font-black text-sm mb-4 flex items-center gap-2 text-blue-400 uppercase tracking-widest">
                        <span>🎨</span> Melody Palette
                    </h3>
                    <div id="palette-grid" class="grid grid-cols-2 gap-2">
                        <!-- Generated by JS -->
                    </div>
                </div>

                <div class="control-panel p-5">
                    <h3 class="font-black text-sm mb-4 flex items-center gap-2 text-yellow-400 uppercase tracking-widest">
                        <span>🎼</span> Tune Selection
                    </h3>
                    <select id="tune-select" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white font-bold mb-4 focus:ring-2 focus:ring-yellow-400 outline-none">
                        <option value="major">Happy Major</option>
                        <option value="minor">Emotional Minor</option>
                        <option value="lydian">Dreamy Lydian</option>
                        <option value="blues">Blues Rock</option>
                    </select>

                    <label class="text-[10px] font-black uppercase opacity-50 tracking-widest">Tempo: <span id="bpm-val">124</span> BPM</label>
                    <input type="range" id="bpm-slider" min="80" max="160" value="124" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-pink-500 mt-2 mb-6">
                    
                    <button id="start-btn" class="w-full bg-pink-600 hover:bg-pink-500 text-white font-black py-4 rounded-xl shadow-xl transition-all active:scale-95 text-lg border-b-4 border-pink-900">
                        START SESSION 💿
                    </button>
                    <button id="download-btn" class="hidden w-full mt-2 bg-slate-800 hover:bg-slate-700 text-pink-400 font-black py-3 rounded-xl transition-all border border-pink-500/30">
                        DOWNLOAD WAV 💾
                    </button>
                </div>
            </div>

            <!-- Game View -->
            <div class="lg:col-span-8 space-y-4">
                <div class="bg-slate-900/50 p-6 rounded-[32px] border border-white/5 backdrop-blur-sm">
                    <div class="flex justify-between items-center mb-6 px-4">
                        <div id="chord-display" class="bg-slate-950 px-4 py-2 rounded-lg text-yellow-400 font-black italic border border-yellow-400/20">Standby...</div>
                        <div class="flex gap-8 text-right">
                            <div><p class="text-[8px] uppercase font-black opacity-40">Score</p><p id="score" class="text-3xl font-black text-pink-400">0</p></div>
                            <div><p class="text-[8px] uppercase font-black opacity-40">Streak</p><p id="combo" class="text-3xl font-black text-yellow-400">x1</p></div>
                        </div>
                    </div>
                    
                    <div id="game-tracks" class="grid grid-cols-4 gap-4 relative">
                        <div class="beat-track" id="track-0"><div class="hit-zone"></div><div class="absolute top-2 left-0 right-0 text-center font-black opacity-20 text-4xl">A</div></div>
                        <div class="beat-track" id="track-1"><div class="hit-zone"></div><div class="absolute top-2 left-0 right-0 text-center font-black opacity-20 text-4xl">S</div></div>
                        <div class="beat-track" id="track-2"><div class="hit-zone"></div><div class="absolute top-2 left-0 right-0 text-center font-black opacity-20 text-4xl">K</div></div>
                        <div class="beat-track" id="track-3"><div class="hit-zone"></div><div class="absolute top-2 left-0 right-0 text-center font-black opacity-20 text-4xl">L</div></div>
                    </div>

                    <div id="feedback" class="mt-6 text-center font-black text-xl italic text-slate-500 uppercase tracking-tighter">Ready?</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- DATA & CONFIG ---
        const EMOJIS = ["🥚", "🐥", "🐰", "🌸", "🎨", "🍭", "🎼", "🎸", "🎵", "✨"];
        
        const LIBRARY = [
            { id: 'piano', name: 'Grand Piano', icon: '🎹' },
            { id: 'flute', name: 'Pure Flute', icon: '🌬️' },
            { id: 'guitar', name: 'Nylon Gtr', icon: '🎸' },
            { id: 'chip', name: 'NES Chip', icon: '👾' },
            { id: 'bell', name: 'Crystal', icon: '🔔' },
            { id: 'synth1', name: 'Space Pad', icon: '🧬' },
            { id: 'synth2', name: 'Brass Lead', icon: '📡' },
            { id: 'bass', name: 'Deep Sub', icon: '🔊' }
        ];

        const PALETTES = [
            { id: 'chords', name: 'Full Chords', icon: '🧱' },
            { id: 'arpeggio', name: 'Arp 1/8', icon: '🌀' },
            { id: 'lead', name: 'Lead Riff', icon: '🔥' },
            { id: 'bassline', name: 'Groove Bass', icon: '🎸' }
        ];

        const TUNE_SETS = {
            major: ['C', 'F', 'G', 'Am'],
            minor: ['Am', 'Dm', 'Em', 'F'],
            lydian: ['Bb', 'C', 'Dm', 'Am'],
            blues: ['C', 'Bb', 'F', 'D']
        };

        const CHORD_DATA = {
            'C': [261.63, 329.63, 392.00], 
            'Am': [220.00, 261.63, 329.63], 
            'G': [196.00, 246.94, 293.66], 
            'F': [174.61, 220.00, 261.63],
            'Dm': [293.66, 349.23, 440.00],
            'Em': [329.63, 392.00, 493.88],
            'Bb': [233.08, 293.66, 349.23],
            'D': [293.66, 369.99, 440.00]
        };

        // --- STATE ---
        let activeInstr = 'piano';
        let activePalette = 'chords';
        let audioCtx, mainOut, destStream, mediaRec, audioChunks = [];
        let isPlaying = false, score = 0, combo = 1, bpm = 124, mainTimer = null;
        let currentProg = [];

        // --- UI BUILDERS ---
        const instrGrid = document.getElementById('instrument-grid');
        LIBRARY.forEach(inst => {
            const btn = document.createElement('button');
            btn.className = `instr-btn p-2 rounded-lg text-xs font-bold flex flex-col items-center gap-1 ${inst.id === activeInstr ? 'active' : ''}`;
            btn.innerHTML = `<span class="text-xl">${inst.icon}</span><span>${inst.name}</span>`;
            btn.onclick = () => {
                activeInstr = inst.id;
                document.querySelectorAll('.instr-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
            instrGrid.appendChild(btn);
        });

        const paletteGrid = document.getElementById('palette-grid');
        PALETTES.forEach(pal => {
            const btn = document.createElement('button');
            btn.className = `palette-btn p-3 rounded-xl text-xs font-bold flex items-center gap-3 ${pal.id === activePalette ? 'active' : ''}`;
            btn.innerHTML = `<span class="text-xl">${pal.icon}</span><span>${pal.name}</span>`;
            btn.onclick = () => {
                activePalette = pal.id;
                document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
            paletteGrid.appendChild(btn);
        });

        // --- AUDIO ENGINE ---
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            mainOut = audioCtx.createGain();
            mainOut.gain.value = 0.5;
            destStream = audioCtx.createMediaStreamDestination();
            mainOut.connect(destStream);
            mainOut.connect(audioCtx.destination);
        }

        function playInstrument(freq, dur = 0.5, vol = 0.15, type = activeInstr) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const g = audioCtx.createGain();
            g.connect(mainOut);
            
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const filter = audioCtx.createBiquadFilter();

            switch(type) {
                case 'piano':
                    osc1.type = 'triangle';
                    osc2.type = 'sine';
                    osc1.frequency.setValueAtTime(freq, now);
                    osc2.frequency.setValueAtTime(freq * 1.005, now);
                    g.gain.setValueAtTime(vol, now);
                    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
                    osc1.connect(g); osc2.connect(g);
                    osc1.start(); osc2.start();
                    osc1.stop(now + dur); osc2.stop(now + dur);
                    break;

                case 'flute':
                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(freq, now);
                    // Add slight vibrato
                    const lfo = audioCtx.createOscillator();
                    const lfoG = audioCtx.createGain();
                    lfo.frequency.value = 5;
                    lfoG.gain.value = 5;
                    lfo.connect(lfoG);
                    lfoG.connect(osc1.frequency);
                    lfo.start(); lfo.stop(now + dur);
                    
                    g.gain.linearRampToValueAtTime(vol, now + 0.1);
                    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
                    osc1.connect(g);
                    osc1.start(); osc1.stop(now + dur);
                    break;

                case 'guitar':
                    osc1.type = 'sawtooth';
                    osc1.frequency.setValueAtTime(freq, now);
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(freq * 4, now);
                    filter.frequency.exponentialRampToValueAtTime(freq, now + dur);
                    osc1.connect(filter);
                    filter.connect(g);
                    g.gain.setValueAtTime(vol * 0.8, now);
                    g.gain.exponentialRampToValueAtTime(0.0001, now + dur * 0.5);
                    osc1.start(); osc1.stop(now + dur);
                    break;

                case 'chip':
                    osc1.type = 'square';
                    osc1.frequency.setValueAtTime(freq, now);
                    g.gain.setValueAtTime(vol * 0.4, now);
                    g.gain.setValueAtTime(0.0001, now + dur * 0.2); // Gate effect
                    osc1.connect(g);
                    osc1.start(); osc1.stop(now + dur);
                    break;

                case 'bell':
                    osc1.type = 'sine';
                    osc2.type = 'sine';
                    osc1.frequency.setValueAtTime(freq, now);
                    osc2.frequency.setValueAtTime(freq * 2.01, now);
                    g.gain.setValueAtTime(vol, now);
                    g.gain.exponentialRampToValueAtTime(0.0001, now + dur * 2);
                    osc1.connect(g); osc2.connect(g);
                    osc1.start(); osc2.start();
                    osc1.stop(now + dur * 2); osc2.stop(now + dur * 2);
                    break;

                case 'synth1': // Pad
                    osc1.type = 'sawtooth';
                    osc1.frequency.setValueAtTime(freq, now);
                    filter.type = 'lowpass';
                    filter.frequency.value = 800;
                    osc1.connect(filter);
                    filter.connect(g);
                    g.gain.linearRampToValueAtTime(vol, now + dur * 0.5);
                    g.gain.linearRampToValueAtTime(0.0001, now + dur);
                    osc1.start(); osc1.stop(now + dur);
                    break;

                case 'synth2': // Brass
                    osc1.type = 'sawtooth';
                    osc1.frequency.setValueAtTime(freq, now);
                    osc2.type = 'sawtooth';
                    osc2.frequency.setValueAtTime(freq * 1.01, now);
                    g.gain.setValueAtTime(vol, now);
                    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
                    osc1.connect(g); osc2.connect(g);
                    osc1.start(); osc2.start();
                    osc1.stop(now + dur); osc2.stop(now + dur);
                    break;

                case 'bass':
                    osc1.type = 'triangle';
                    osc1.frequency.setValueAtTime(freq / 2, now);
                    const drive = audioCtx.createWaveShaper();
                    drive.curve = makeDistortionCurve(400);
                    osc1.connect(drive);
                    drive.connect(g);
                    g.gain.setValueAtTime(vol * 1.5, now);
                    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
                    osc1.start(); osc1.stop(now + dur);
                    break;
            }
        }

        function makeDistortionCurve(amount) {
            let k = amount, n_samples = 44100, curve = new Float32Array(n_samples);
            for (let i = 0; i < n_samples; ++i) {
                let x = i * 2 / n_samples - 1;
                curve[i] = (3 + k) * x * 20 * (Math.PI / 180) / (Math.PI + k * Math.abs(x));
            }
            return curve;
        }

        function playDrum(freq, type, dur, vol) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, now);
            if (type === 'sine') osc.frequency.exponentialRampToValueAtTime(20, now + dur);
            g.gain.setValueAtTime(vol, now);
            g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
            osc.connect(g);
            g.connect(mainOut);
            osc.start();
            osc.stop(now + dur);
        }

        // --- GAME LOOP ---
        function startSession() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const tuneType = document.getElementById('tune-select').value;
            currentProg = TUNE_SETS[tuneType];
            document.getElementById('chord-display').innerText = currentProg.join(" ➔ ");
            
            isPlaying = true; score = 0; combo = 1;
            updateUI();
            
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('rec-indicator').classList.remove('hidden');
            
            audioChunks = [];
            mediaRec = new MediaRecorder(destStream.stream);
            mediaRec.ondataavailable = e => audioChunks.push(e.data);
            mediaRec.onstop = saveWav;
            mediaRec.start();

            const startTime = audioCtx.currentTime;
            const beatLen = 60 / bpm;
            let currentBeat = 0;

            mainTimer = setInterval(() => {
                const now = audioCtx.currentTime - startTime;
                if (now >= currentBeat * beatLen) {
                    const chordName = currentProg[Math.floor((currentBeat % 32) / 8)];
                    const chordNotes = CHORD_DATA[chordName];
                    
                    // Logic based on Active Palette
                    handlePalettePlayback(currentBeat, chordNotes, beatLen);

                    // Drums
                    playDrum(60, 'sine', 0.2, 0.4); // Kick
                    if (currentBeat % 4 === 2) playDrum(200, 'triangle', 0.1, 0.1); // Snare
                    if (currentBeat % 2 === 1) playDrum(10000, 'triangle', 0.05, 0.03); // Hi-hat

                    // Random Note Spawning for Gameplay
                    if (currentBeat > 16 && Math.random() < 0.45) {
                        spawnNote(Math.floor(Math.random() * 4));
                    }

                    currentBeat++;
                }
                if (currentBeat > 160) stopSession();
            }, 10);
        }

        function handlePalettePlayback(beat, notes, beatLen) {
            const now = audioCtx.currentTime;
            
            switch(activePalette) {
                case 'chords':
                    if (beat % 4 === 0) {
                        notes.forEach(f => playInstrument(f, beatLen * 3.5, 0.12));
                    }
                    break;
                
                case 'arpeggio':
                    const arpNote = notes[beat % 3];
                    playInstrument(arpNote * 2, beatLen * 0.8, 0.15);
                    break;

                case 'lead':
                    if (beat % 2 === 0) {
                        const riff = [notes[0]*2, notes[1]*2, notes[2]*2, notes[1]*2.5];
                        playInstrument(riff[beat % 4], beatLen * 1.5, 0.18);
                    }
                    break;

                case 'bassline':
                    if (beat % 4 === 0 || beat % 4 === 3) {
                        playInstrument(notes[0] / 2, beatLen * 0.5, 0.2, 'bass');
                    }
                    break;
            }
        }

        function spawnNote(idx) {
            const note = document.createElement('div');
            note.className = 'note';
            const emojiIdx = Math.floor(Math.random() * EMOJIS.length);
            note.innerHTML = EMOJIS[emojiIdx];
            note.style.top = '-80px';
            note.style.left = 'calc(50% - 35px)';
            const track = document.getElementById(`track-${idx}`);
            if (track) track.appendChild(note);

            let pos = -80;
            const speed = (bpm / 18);
            const move = setInterval(() => {
                if (!isPlaying) { note.remove(); clearInterval(move); return; }
                pos += speed;
                note.style.top = pos + 'px';
                if (pos > 520) {
                    note.remove();
                    clearInterval(move);
                    missAction();
                }
            }, 16);
            note.dataset.moveId = move;
        }

        function hitAction(idx) {
            if (!isPlaying) return;
            const track = document.getElementById(`track-${idx}`);
            const notes = track.getElementsByClassName('note');
            
            track.classList.add('bg-white/10');
            setTimeout(() => track.classList.remove('bg-white/10'), 100);

            if (notes.length > 0) {
                const n = notes[0];
                const pos = parseInt(n.style.top);
                if (pos > 340 && pos < 490) {
                    const acc = 1 - Math.abs(pos - 415) / 75;
                    const pts = Math.floor(250 * acc * combo);
                    score += pts; combo++;
                    document.getElementById('feedback').innerText = acc > 0.8 ? "PERFECT! 🔥" : "GOOD ✨";
                    
                    // Instant Sound Feedback based on palette
                    const chord = currentProg[0] || 'C';
                    playInstrument(CHORD_DATA[chord][2] * 2.5, 0.2, 0.2, activeInstr);
                    
                    clearInterval(n.dataset.moveId);
                    n.remove();
                    updateUI();
                } else missAction();
            } else missAction();
        }

        function missAction() {
            if (combo > 5) document.getElementById('feedback').innerText = "STREAK BROKEN";
            combo = 1;
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('combo').innerText = 'x' + combo;
        }

        function stopSession() {
            isPlaying = false;
            clearInterval(mainTimer);
            if (mediaRec) mediaRec.stop();
            document.getElementById('rec-indicator').classList.add('hidden');
            document.getElementById('start-btn').classList.remove('hidden');
            document.getElementById('download-btn').classList.remove('hidden');
            document.getElementById('feedback').innerText = "SESSION COMPLETE: " + score;
        }

        function saveWav() {
            const blob = new Blob(audioChunks, { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            document.getElementById('download-btn').onclick = () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = `RohanStudio_${Date.now()}.wav`;
                a.click();
            };
        }

        window.addEventListener('keydown', e => {
            if (e.repeat) return;
            const map = { 'KeyA': 0, 'KeyS': 1, 'KeyK': 2, 'KeyL': 3 };
            if (map.hasOwnProperty(e.code)) hitAction(map[e.code]);
        });

        document.getElementById('bpm-slider').oninput = function() {
            bpm = parseInt(this.value);
            document.getElementById('bpm-val').innerText = bpm;
        };

        document.getElementById('start-btn').onclick = startSession;
    </script>
</body>
</html>
