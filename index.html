<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easter Room OS - Full Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');
        
        :root {
            --g-blue: #4285F4;
            --g-red: #EA4335;
            --g-yellow: #FBBC05;
            --g-green: #34A853;
            --g-gray: #5f6368;
            --bg-main: #f8f9fa;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg-main);
            color: #202124;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .os-container {
            display: grid;
            grid-template-rows: 64px 1fr 80px;
            height: 100vh;
        }

        .google-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
        }

        .nav-btn {
            color: var(--g-gray);
            transition: all 0.2s ease;
            border-bottom: 3px solid transparent;
        }

        .nav-btn.active {
            color: var(--g-blue);
            border-bottom-color: var(--g-blue);
        }

        .page-view {
            display: none;
            height: 100%;
            padding: 24px;
            animation: fadeIn 0.2s ease;
        }

        .page-view.active { display: grid; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 10px; }

        .btn-primary {
            background-color: var(--g-blue);
            color: white;
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 24px;
            transition: all 0.2s;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
            font-size: 12px;
        }

        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            height: 100%;
        }
        .calendar-day-header {
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--g-gray);
            padding: 12px;
            border-bottom: 1px solid #f1f3f4;
            text-transform: uppercase;
        }
        .calendar-cell {
            border-right: 1px solid #f1f3f4;
            border-bottom: 1px solid #f1f3f4;
            padding: 10px;
            height: 100%;
            min-height: 100px;
            background: white;
            position: relative;
        }
        .calendar-cell:hover { background-color: #fcfcfc; }
        
        .event-chip {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
            background: #e8f0fe;
            color: #1967d2;
        }

        #wheel-svg {
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid var(--g-red);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="os-container">
        <!-- HEADER -->
        <header class="bg-white border-b border-gray-200 flex items-center justify-between px-6">
            <div class="flex items-center gap-3">
                <div class="flex gap-1">
                    <div class="w-2 h-2 rounded-full bg-[#4285F4]"></div>
                    <div class="w-2 h-2 rounded-full bg-[#EA4335]"></div>
                    <div class="w-2 h-2 rounded-full bg-[#FBBC05]"></div>
                    <div class="w-2 h-2 rounded-full bg-[#34A853]"></div>
                </div>
                <span class="text-xl font-medium">Easter Room <span class="font-bold">OS</span></span>
            </div>
            <div id="clock" class="text-lg font-medium text-gray-700 font-mono">00:00:00</div>
        </header>

        <!-- MAIN VIEWPORT -->
        <main class="relative h-full overflow-hidden">
            
            <!-- VIEW: DIRECTORY -->
            <div id="view-users" class="page-view active grid-cols-12 gap-6">
                <div class="col-span-4 google-card p-6 flex flex-col">
                    <h2 class="text-lg font-medium mb-4">Add Participant</h2>
                    <div class="space-y-4">
                        <input id="user-name-input" type="text" placeholder="Enter full name" class="w-full border border-gray-300 p-3 rounded-lg outline-none">
                        <select id="user-role-input" class="w-full border border-gray-300 p-3 rounded-lg bg-white">
                            <option value="GUEST">Guest</option>
                            <option value="MODERATOR">Moderator</option>
                            <option value="ADMIN">Administrator</option>
                        </select>
                        <button onclick="handleManualAdd()" class="btn-primary w-full">Add User</button>
                        <button onclick="addRandomUsers(50)" class="w-full text-xs font-bold text-blue-600 bg-blue-50 py-2 rounded-lg">Add 50 Random Users</button>
                    </div>
                    <div class="mt-auto pt-6">
                        <div class="flex justify-between text-xs font-bold text-gray-500 mb-2">
                            <span>Population</span>
                            <span id="user-count-label">0 / 500+</span>
                        </div>
                        <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                            <div id="user-progress-bar" class="h-full bg-green-500 transition-all duration-300 w-0"></div>
                        </div>
                    </div>
                </div>
                <div class="col-span-8 google-card flex flex-col overflow-hidden">
                    <div class="p-4 border-b flex justify-between items-center">
                        <h3 class="font-medium">User Directory</h3>
                        <div class="text-xs bg-gray-100 px-3 py-1 rounded-full text-gray-600 font-mono" id="last-action">Ready</div>
                    </div>
                    <div id="user-list" class="flex-1 overflow-y-auto custom-scroll p-4 grid grid-cols-2 md:grid-cols-3 gap-3"></div>
                </div>
            </div>

            <!-- VIEW: CALENDAR -->
            <div id="view-calendar" class="page-view grid-cols-12 gap-6">
                <div class="col-span-12 google-card p-0 flex flex-col overflow-hidden">
                    <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-white">
                        <div class="flex items-center gap-4">
                            <h2 id="calendar-month-year" class="text-lg font-medium w-40 text-center">March 2026</h2>
                            <div class="flex border border-gray-200 rounded-lg overflow-hidden">
                                <button onclick="changeMonth(-1)" class="px-4 py-1 hover:bg-gray-50">‹</button>
                                <button onclick="changeMonth(1)" class="px-4 py-1 hover:bg-gray-50 border-l">›</button>
                            </div>
                        </div>
                        <button onclick="addEvent()" class="btn-primary text-xs py-2">Add Event</button>
                    </div>
                    <div class="flex-1 overflow-y-auto custom-scroll bg-gray-50">
                        <div class="calendar-grid h-full" id="calendar-display"></div>
                    </div>
                </div>
            </div>

            <!-- VIEW: PRIZE DRAW -->
            <div id="view-draw" class="page-view grid-cols-12 gap-6">
                <div class="col-span-4 google-card p-6 flex flex-col">
                    <h2 class="text-lg font-medium mb-4">Spin Entry List</h2>
                    <div id="draw-list" class="flex-1 overflow-y-auto custom-scroll space-y-1"></div>
                    <button onclick="spinWheel()" id="spin-btn" class="btn-primary w-full mt-4 disabled:opacity-50">Spin The Wheel</button>
                </div>
                <div class="col-span-8 google-card flex flex-col items-center justify-center relative bg-gray-50">
                    <div id="winner-banner" class="absolute top-10 transform scale-0 transition-transform duration-500 bg-white text-blue-600 border-2 border-blue-600 px-10 py-4 rounded-2xl font-bold text-3xl shadow-2xl z-20">
                        🎉 <span id="winner-name">Winner</span>! 🎉
                    </div>
                    <div id="wheel-container" class="w-[350px] h-[350px] relative">
                        <div class="wheel-pointer"></div>
                        <svg id="wheel-svg" viewBox="0 0 100 100" class="w-full h-full drop-shadow-xl">
                            <circle cx="50" cy="50" r="48" fill="white" stroke="#eee" stroke-width="2"/>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- VIEW: ANALYTICS -->
            <div id="view-tracking" class="page-view grid-cols-12 gap-6">
                <div class="col-span-12 google-card p-8">
                    <h2 class="text-xl font-medium mb-6">Database Health</h2>
                    <div class="h-64">
                        <canvas id="healthChart"></canvas>
                    </div>
                </div>
            </div>

        </main>

        <!-- NAVIGATION -->
        <nav class="bg-white border-t border-gray-200 flex items-center justify-center gap-6">
            <button onclick="switchPage('users', this)" class="nav-btn active flex flex-col items-center justify-center h-full px-4">
                <span class="text-xl">👥</span>
                <span class="text-[9px] font-bold uppercase tracking-widest mt-1">Directory</span>
            </button>
            <button onclick="switchPage('calendar', this)" class="nav-btn flex flex-col items-center justify-center h-full px-4">
                <span class="text-xl">📅</span>
                <span class="text-[9px] font-bold uppercase tracking-widest mt-1">Planner</span>
            </button>
            <button onclick="switchPage('draw', this)" class="nav-btn flex flex-col items-center justify-center h-full px-4">
                <span class="text-xl">🎡</span>
                <span class="text-[9px] font-bold uppercase tracking-widest mt-1">Prize Draw</span>
            </button>
            <button onclick="switchPage('tracking', this)" class="nav-btn flex flex-col items-center justify-center h-full px-4">
                <span class="text-xl">📊</span>
                <span class="text-[9px] font-bold uppercase tracking-widest mt-1">Analytics</span>
            </button>
        </nav>
    </div>

    <script>
        let users = [];
        let currentCalendarDate = new Date();
        let isSpinning = false;
        let currentRotation = 0;
        let healthChart = null;

        window.onload = () => {
            initClock();
            initChart();
            renderUsers();
            renderCalendar();
            updateWheel();
        };

        function initClock() {
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toTimeString().split(' ')[0];
            }, 1000);
        }

        function initChart() {
            const ctx = document.getElementById('healthChart');
            healthChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['T-5', 'T-4', 'T-3', 'T-2', 'T-1', 'Now'],
                    datasets: [{
                        label: 'User Load',
                        data: [0, 0, 0, 0, 0, 0],
                        borderColor: '#4285F4',
                        backgroundColor: 'rgba(66, 133, 244, 0.1)',
                        fill: true, tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function switchPage(pageId, btn) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${pageId}`).classList.add('active');
            btn.classList.add('active');
            if(pageId === 'draw') { renderDrawList(); updateWheel(); }
            if(pageId === 'calendar') { renderCalendar(); }
        }

        // --- DIRECTORY LOGIC ---
        function handleManualAdd() {
            const nameInp = document.getElementById('user-name-input');
            const roleInp = document.getElementById('user-role-input');
            const name = nameInp.value.trim();
            if(!name) return;
            users.push({ id: Date.now() + Math.random(), name, role: roleInp.value, color: getRandomColor() });
            nameInp.value = '';
            updateUI();
        }

        function addRandomUsers(count) {
            const first = ["James", "Mary", "Robert", "Patricia", "John", "Jennifer", "Michael", "Linda", "David", "Barbara"];
            const last = ["Smith", "Jones", "Brown", "Taylor", "Williams", "Wilson", "Johnson", "Davis", "Miller"];
            for(let i = 0; i < count; i++) {
                users.push({
                    id: Date.now() + Math.random(),
                    name: `${first[Math.floor(Math.random()*first.length)]} ${last[Math.floor(Math.random()*last.length)]}`,
                    role: "GUEST",
                    color: getRandomColor()
                });
            }
            updateUI();
        }

        function updateUI() {
            renderUsers();
            const count = users.length;
            document.getElementById('user-count-label').innerText = `${count} / 500+`;
            document.getElementById('user-progress-bar').style.width = `${Math.min((count/500)*100, 100)}%`;
            if(healthChart) {
                healthChart.data.datasets[0].data.shift();
                healthChart.data.datasets[0].data.push(count);
                healthChart.update();
            }
        }

        function renderUsers() {
            const list = document.getElementById('user-list');
            list.innerHTML = users.length === 0 ? `<div class="col-span-full text-center py-12 text-gray-400">Empty</div>` :
                users.map(u => `
                    <div class="bg-white border p-3 rounded-xl flex items-center gap-3 hover:border-blue-300 group">
                        <div class="user-avatar" style="background-color: ${u.color}">${u.name.charAt(0)}</div>
                        <div class="flex-1 overflow-hidden">
                            <div class="text-xs font-bold truncate">${u.name}</div>
                            <div class="text-[8px] text-gray-400 font-bold uppercase">${u.role}</div>
                        </div>
                    </div>
                `).join('');
        }

        // --- CALENDAR LOGIC ---
        function renderCalendar() {
            const display = document.getElementById('calendar-display');
            const label = document.getElementById('calendar-month-year');
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            
            label.innerText = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(currentCalendarDate);
            display.innerHTML = '';

            ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(d => {
                const h = document.createElement('div'); h.className = 'calendar-day-header'; h.innerText = d; display.appendChild(h);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const prevDays = new Date(year, month, 0).getDate();

            for(let i = firstDay - 1; i >= 0; i--) createCell(prevDays - i, true);
            for(let i = 1; i <= daysInMonth; i++) createCell(i, false);
        }

        function createCell(num, isOther) {
            const cell = document.createElement('div');
            cell.className = `calendar-cell ${isOther ? 'opacity-30' : ''}`;
            cell.innerHTML = `<div class="text-[11px] font-bold text-gray-400 mb-1">${num}</div>`;
            if(!isOther && num % 7 === 0) cell.innerHTML += `<div class="event-chip">System Sync</div>`;
            document.getElementById('calendar-display').appendChild(cell);
        }

        function changeMonth(delta) { currentCalendarDate.setMonth(currentCalendarDate.getMonth() + delta); renderCalendar(); }

        // --- DRAW LOGIC ---
        function renderDrawList() {
            const list = document.getElementById('draw-list');
            list.innerHTML = users.map(u => `
                <div class="flex items-center gap-3 p-2 bg-gray-50 rounded-lg text-xs font-medium">
                    <div class="w-2 h-2 rounded-full" style="background-color: ${u.color}"></div>
                    <span class="truncate">${u.name}</span>
                </div>
            `).join('');
            document.getElementById('spin-btn').disabled = users.length < 2;
        }

        function updateWheel() {
            const svg = document.getElementById('wheel-svg');
            if(users.length < 2) {
                svg.innerHTML = `<circle cx="50" cy="50" r="48" fill="white" stroke="#eee" stroke-width="2"/><text x="50" y="52" text-anchor="middle" font-size="4" fill="#ccc">NEED 2+ USERS</text>`;
                return;
            }
            const slice = 360 / users.length;
            let paths = '';
            users.forEach((u, i) => {
                const start = i * slice; const end = (i + 1) * slice;
                const x1 = 50 + 48 * Math.cos(Math.PI * (start - 90) / 180);
                const y1 = 50 + 48 * Math.sin(Math.PI * (start - 90) / 180);
                const x2 = 50 + 48 * Math.cos(Math.PI * (end - 90) / 180);
                const y2 = 50 + 48 * Math.sin(Math.PI * (end - 90) / 180);
                paths += `<path d="M 50 50 L ${x1} ${y1} A 48 48 0 ${slice > 180 ? 1 : 0} 1 ${x2} ${y2} Z" fill="${u.color}" stroke="white" stroke-width="0.2"/>`;
            });
            svg.innerHTML = paths + `<circle cx="50" cy="50" r="4" fill="white"/>`;
        }

        function spinWheel() {
            if(isSpinning) return;
            isSpinning = true;
            document.getElementById('winner-banner').classList.replace('scale-100', 'scale-0');
            const extra = 1800 + Math.random() * 1800;
            currentRotation += extra;
            document.getElementById('wheel-svg').style.transform = `rotate(${currentRotation}deg)`;
            setTimeout(() => {
                isSpinning = false;
                const winningAngle = (360 - (currentRotation % 360)) % 360;
                const winner = users[Math.floor(winningAngle / (360 / users.length))];
                document.getElementById('winner-name').innerText = winner.name;
                document.getElementById('winner-banner').classList.replace('scale-0', 'scale-100');
            }, 4000);
        }

        function getRandomColor() { return ['#4285F4','#EA4335','#FBBC05','#34A853','#9C27B0','#FF9800','#009688','#607D8B'][Math.floor(Math.random()*8)]; }
    </script>
</body>
</html>
